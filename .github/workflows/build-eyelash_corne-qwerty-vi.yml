name: 'Build Eyelash Corne nice_nano_v2 nice_view QWERTY VI'
on: 
  push:
    branches: [ master ]
jobs: 
  build-eyelash_corne-qwerty-vi:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["eyelash_corne_left", "eyelash_corne_right"]'
      shield: '["nice_view", "nice_view"]'
      alphas: '["qwerty"]'
      nav: '["vi"]' 