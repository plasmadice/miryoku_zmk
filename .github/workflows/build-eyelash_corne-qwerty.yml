name: 'Build Eyelash Corne nice_nano_v2 nice_view QWERTY'
on: 
  workflow_dispatch:
  push:
    branches: [ master ]
jobs:
  build-eyelash_corne-qwerty:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["eyelash_corne_left", "eyelash_corne_right"]'
      shield: '["eyelash_corne_left nice_view_adapter nice_view", "eyelash_corne_right nice_view_adapter nice_view"]'
      alphas: '["qwerty"]'