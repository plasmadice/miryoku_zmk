name: 'Eyelash Corne QWERTY'
on: 
  workflow_dispatch:
  push:
    branches: [ master ]
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["eyelash_corne_left", "eyelash_corne_right"]'
      shield: '["corne_left nice_view_adapter nice_view", "corne_right nice_view_adapter nice_view"]'
      alphas: '["qwerty"]'