name: 'Build Custom Eyelash Corne nice_nano_v2 nice_view'
on: 
  workflow_dispatch:
  push:
    branches: [ master ]
jobs:
  build-eyelash_corne:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["eyelash_corne_left", "eyelash_corne_right"]'
      shield: '["nice_view", "nice_view"]'