name: 'Eyelash Corne QWERTY VI Kconfig'
on: 
  workflow_dispatch:
  push:
    branches: [ master ]
jobs: 
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["eyelash_corne_left", "eyelash_corne_right"]'
      shield: '["nice_view", "nice_view"]'
      alphas: '["qwerty"]'
      nav: '["vi"]' 
      extra: '["colemakdh"]'
      kconfig: '["CONFIG_ZMK_MOUSE=n\nCONFIG_ZMK_POINTING=y"]'