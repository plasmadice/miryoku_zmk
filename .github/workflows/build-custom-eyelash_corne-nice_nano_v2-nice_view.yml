name: 'Build Custom Eyelash Corne nice_nano_v2 nice_view QWERTY VI'
on: 
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["eyelash_corne"]'
      shield: '["nice_view_adapter nice_view"]'
      alphas: '["qwerty"]'
      nav: '["vi"]' 